<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pendaftaran Berhasil</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --azure: #0078d4;
      --azure-dark: #005a9e;
      --azure-light: #e8f2fc;
      --ink: #0d1117;
      --ink-muted: #5c6370;
      --ink-faint: #8b949e;
      --surface: #ffffff;
      --surface-2: #f5f8fc;
      --border: #d8e1eb;
      --success: #107c41;
      --success-light: #e8f5ee;
      --success-border: #a8d5b8;
      --radius: 16px;
      --radius-sm: 10px;
      --shadow: 0 4px 24px rgba(0,0,0,0.08), 0 1px 4px rgba(0,0,0,0.04);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Sora', sans-serif;
      background: var(--surface-2);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
      position: relative;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      top: -120px; right: -120px;
      width: 480px; height: 480px;
      background: radial-gradient(circle, rgba(16,124,65,0.07) 0%, transparent 70%);
      pointer-events: none;
    }
    body::after {
      content: '';
      position: fixed;
      bottom: -80px; left: -80px;
      width: 320px; height: 320px;
      background: radial-gradient(circle, rgba(0,120,212,0.05) 0%, transparent 70%);
      pointer-events: none;
    }

    .page-wrapper {
      width: 100%;
      max-width: 520px;
      position: relative;
      z-index: 1;
    }

    /* Brand */
    .brand {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 2rem;
      animation: fadeUp 0.4s ease both;
    }
    .brand-logo {
      width: 36px; height: 36px;
      background: var(--azure);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
    }
    .brand-logo svg { width: 18px; height: 18px; fill: white; }
    .brand-name {
      font-size: 13px; font-weight: 600;
      letter-spacing: 0.06em; text-transform: uppercase;
      color: var(--azure);
    }

    /* Success icon */
    .success-icon-wrap {
      width: 72px; height: 72px;
      margin: 0 auto 1.5rem;
      position: relative;
      animation: popIn 0.5s cubic-bezier(0.34,1.56,0.64,1) 0.2s both;
    }
    @keyframes popIn {
      from { opacity: 0; transform: scale(0.5); }
      to   { opacity: 1; transform: scale(1); }
    }
    .success-icon-wrap .ring {
      position: absolute; inset: 0;
      border-radius: 50%;
      border: 2px solid var(--success-border);
      animation: ringPulse 2s ease-out 0.7s infinite;
    }
    @keyframes ringPulse {
      0%   { transform: scale(1); opacity: 0.6; }
      100% { transform: scale(1.5); opacity: 0; }
    }
    .success-icon {
      width: 72px; height: 72px;
      background: var(--success-light);
      border: 1.5px solid var(--success-border);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      position: relative;
    }
    .success-icon svg {
      width: 30px; height: 30px;
      stroke: var(--success);
      fill: none;
      stroke-width: 2.5;
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-dasharray: 50;
      stroke-dashoffset: 50;
      animation: drawCheck 0.5s ease 0.4s forwards;
    }
    @keyframes drawCheck {
      to { stroke-dashoffset: 0; }
    }

    /* Card */
    .card {
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      padding: 2rem;
      position: relative;
      overflow: hidden;
      text-align: center;
      animation: fadeUp 0.45s ease 0.15s both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      /* background: linear-gradient(90deg, var(--success), #4caf87, var(--success)); */
      background-size: 200% 100%;
      animation: shimmer 3s linear infinite;
    }
    @keyframes shimmer {
      0% { background-position: 0% 0; }
      100% { background-position: 200% 0; }
    }

    .card-title {
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--ink);
      letter-spacing: -0.03em;
      margin-bottom: 6px;
    }
    .card-subtitle {
      font-size: 14px;
      color: var(--ink-muted);
      font-weight: 300;
      margin-bottom: 1.75rem;
      line-height: 1.6;
    }

    /* Data rows */
    .data-block {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      overflow: hidden;
      text-align: left;
      margin-bottom: 1rem;
    }
    .data-row {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      animation: fadeUp 0.4s ease both;
    }
    .data-row:nth-child(1) { animation-delay: 0.35s; }
    .data-row:nth-child(2) { animation-delay: 0.42s; }
    .data-row:nth-child(3) { animation-delay: 0.49s; }
    .data-row:last-child { border-bottom: none; }

    .data-icon {
      width: 32px; height: 32px;
      background: var(--azure-light);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      margin-top: 1px;
    }
    .data-icon svg {
      width: 14px; height: 14px;
      stroke: var(--azure); fill: none;
      stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round;
    }
    .data-content { flex: 1; min-width: 0; }
    .data-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--ink-faint);
      margin-bottom: 2px;
    }
    .data-value {
      font-size: 14px;
      font-weight: 500;
      color: var(--ink);
      word-break: break-word;
    }
    .data-value.mono {
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      font-weight: 400;
    }
    .data-value a {
      color: var(--azure);
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 5px;
      transition: color 0.2s;
    }
    .data-value a:hover { color: var(--azure-dark); text-decoration: underline; }
    .data-value a svg {
      width: 12px; height: 12px;
      stroke: currentColor; fill: none;
      stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round;
      flex-shrink: 0;
    }

    /* ID badge */
    .id-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--azure-light);
      border: 1px solid #b3d4f0;
      border-radius: 6px;
      padding: 4px 10px;
      font-size: 11px;
      font-family: 'DM Mono', monospace;
      color: var(--azure-dark);
      margin-bottom: 1.5rem;
      font-weight: 500;
    }
    .id-badge::before {
      content: '';
      width: 6px; height: 6px;
      background: var(--azure);
      border-radius: 50%;
      display: inline-block;
      animation: blink 1.5s ease infinite;
    }
    @keyframes blink {
      0%, 100% { opacity: 1; } 50% { opacity: 0.3; }
    }

    /* Divider */
    .divider {
      height: 1px;
      background: var(--border);
      margin: 1.5rem 0;
    }

    /* Buttons */
    .actions {
      display: flex;
      gap: 10px;
      animation: fadeUp 0.4s ease 0.55s both;
    }
    .btn {
      flex: 1;
      padding: 11px 16px;
      font-family: 'Sora', sans-serif;
      font-size: 14px;
      font-weight: 600;
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      letter-spacing: -0.01em;
      text-decoration: none;
    }
    .btn svg {
      width: 15px; height: 15px;
      stroke: currentColor; fill: none;
      stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round;
    }
    .btn-secondary {
      background: var(--surface);
      border: 1.5px solid var(--border);
      color: var(--ink-muted);
    }
    .btn-secondary:hover {
      border-color: var(--azure);
      color: var(--azure);
      background: var(--azure-light);
    }
    .btn-primary {
      background: var(--azure);
      border: 1.5px solid var(--azure);
      color: white;
      box-shadow: 0 4px 14px rgba(0,120,212,0.28);
    }
    .btn-primary:hover {
      background: var(--azure-dark);
      box-shadow: 0 6px 18px rgba(0,120,212,0.38);
      transform: translateY(-1px);
    }

    /* Footer */
    .footer-note {
      margin-top: 1.25rem;
      text-align: center;
      font-size: 12px;
      color: var(--ink-faint);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      font-weight: 300;
      animation: fadeUp 0.4s ease 0.6s both;
    }
    .footer-note svg {
      width: 13px; height: 13px;
      stroke: var(--ink-faint); fill: none;
      stroke-width: 2; flex-shrink: 0;
    }
  </style>
</head>
<body>
  <div class="page-wrapper">

      <div class="brand-logo">
        <svg viewBox="0 0 24 24"><path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"/></svg>

    <div class="footer-note">
      <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>

  </div>
</body>
