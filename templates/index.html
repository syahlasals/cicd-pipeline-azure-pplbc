<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portal Pendaftaran Pegawai v2.0</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --azure: #0078d4;
      --azure-dark: #005a9e;
      --azure-light: #e8f2fc;
      --azure-glow: rgba(0,120,212,0.15);
      --ink: #0d1117;
      --ink-muted: #5c6370;
      --ink-faint: #8b949e;
      --surface: #ffffff;
      --surface-2: #f5f8fc;
      --border: #d8e1eb;
      --success: #107c41;
      --radius: 16px;
      --radius-sm: 10px;
      --shadow: 0 4px 24px rgba(0,0,0,0.08), 0 1px 4px rgba(0,0,0,0.04);
      --shadow-focus: 0 0 0 3px var(--azure-glow), 0 4px 24px rgba(0,0,0,0.08);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Sora', sans-serif;
      background: var(--surface-2);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
      position: relative;
      overflow-x: hidden;
    }

    /* Background decoration */
    body::before {
      content: '';
      position: fixed;
      top: -120px;
      right: -120px;
      width: 480px;
      height: 480px;
      background: radial-gradient(circle, rgba(0,120,212,0.08) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }
    body::after {
      content: '';
      position: fixed;
      bottom: -80px;
      left: -80px;
      width: 320px;
      height: 320px;
      background: radial-gradient(circle, rgba(0,120,212,0.06) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .page-wrapper {
      width: 100%;
      max-width: 520px;
      position: relative;
      z-index: 1;
      animation: fadeUp 0.5s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Header above card */
    .page-header {
      margin-bottom: 2rem;
      padding-left: 4px;
    }
    .page-header .brand {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }
    .brand-logo {
      width: 36px;
      height: 36px;
      background: var(--azure);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .brand-logo svg {
      width: 18px;
      height: 18px;
      fill: white;
    }
    .brand-name {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--azure);
    }
    .page-header h1 {
      font-size: clamp(1.6rem, 4vw, 2rem);
      font-weight: 700;
      color: var(--ink);
      line-height: 1.25;
      letter-spacing: -0.03em;
    }
    .page-header p {
      margin-top: 8px;
      font-size: 14px;
      color: var(--ink-muted);
      line-height: 1.6;
      font-weight: 300;
    }

    /* Steps indicator */
    .steps {
      display: flex;
      align-items: center;
      gap: 0;
      margin-bottom: 24px;
    }
    .step-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: var(--ink-faint);
      font-weight: 500;
    }
    .step-item.active { color: var(--azure); }
    .step-item.done { color: var(--success); }
    .step-num {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      border: 1.5px solid currentColor;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      font-family: 'DM Mono', monospace;
      font-weight: 500;
      flex-shrink: 0;
    }
    .step-item.active .step-num {
      background: var(--azure);
      border-color: var(--azure);
      color: white;
    }
    .step-connector {
      flex: 1;
      height: 1px;
      background: var(--border);
      margin: 0 10px;
    }

    /* Card */
    .card {
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      padding: 2rem;
      position: relative;
      overflow: hidden;
    }
    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      /* background: linear-gradient(90deg, var(--azure), #50b0f8, var(--azure)); */
      background-size: 200% 100%;
      animation: shimmer 3s linear infinite;
    }
    @keyframes shimmer {
      0% { background-position: 0% 0; }
      100% { background-position: 200% 0; }
    }

    /* Form fields */
    .field {
      margin-bottom: 1.25rem;
      animation: fadeUp 0.5s ease both;
    }
    .field:nth-child(1) { animation-delay: 0.05s; }
    .field:nth-child(2) { animation-delay: 0.10s; }
    .field:nth-child(3) { animation-delay: 0.15s; }

    .field-label {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      font-weight: 600;
      color: var(--ink);
      margin-bottom: 8px;
      letter-spacing: -0.01em;
    }
    .field-label .icon {
      width: 20px;
      height: 20px;
      background: var(--azure-light);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .field-label .icon svg {
      width: 11px;
      height: 11px;
      stroke: var(--azure);
      fill: none;
      stroke-width: 2.2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .field-label .required {
      color: #e53935;
      font-size: 11px;
      margin-left: auto;
      font-weight: 400;
      letter-spacing: 0;
    }

    .field-hint {
      font-size: 12px;
      color: var(--ink-faint);
      margin-bottom: 8px;
      font-weight: 300;
    }

    input[type="text"],
    input[type="email"] {
      width: 100%;
      padding: 11px 14px;
      font-size: 14px;
      font-family: 'Sora', sans-serif;
      color: var(--ink);
      background: var(--surface-2);
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
    }
    input[type="text"]:hover,
    input[type="email"]:hover {
      border-color: #a8c6e8;
    }
    input[type="text"]:focus,
    input[type="email"]:focus {
      border-color: var(--azure);
      background: white;
      box-shadow: var(--shadow-focus);
    }
    input::placeholder { color: var(--ink-faint); font-weight: 300; }

    /* File upload */
    .file-drop {
      position: relative;
      border: 1.5px dashed var(--border);
      border-radius: var(--radius-sm);
      background: var(--surface-2);
      padding: 24px 16px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
    }
    .file-drop:hover,
    .file-drop.drag-over {
      border-color: var(--azure);
      background: var(--azure-light);
    }
    .file-drop input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
      width: 100%;
      height: 100%;
    }
    .file-drop-icon {
      width: 40px;
      height: 40px;
      background: white;
      border-radius: 12px;
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }
    .file-drop-icon svg {
      width: 18px;
      height: 18px;
      stroke: var(--azure);
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .file-drop-text {
      font-size: 13px;
      color: var(--ink);
      font-weight: 500;
      margin-bottom: 4px;
    }
    .file-drop-text span { color: var(--azure); text-decoration: underline; }
    .file-drop-hint {
      font-size: 11px;
      color: var(--ink-faint);
      font-weight: 300;
    }
    .file-name-display {
      display: none;
      align-items: center;
      gap: 8px;
      margin-top: 10px;
      padding: 8px 12px;
      background: white;
      border-radius: 8px;
      border: 1px solid var(--border);
      font-size: 12px;
      color: var(--ink);
      font-family: 'DM Mono', monospace;
    }
    .file-name-display.visible { display: flex; }
    .file-name-display svg {
      width: 14px;
      height: 14px;
      stroke: var(--success);
      fill: none;
      stroke-width: 2.5;
      stroke-linecap: round;
      stroke-linejoin: round;
      flex-shrink: 0;
    }

    /* Divider */
    .divider {
      height: 1px;
      background: var(--border);
      margin: 1.5rem 0;
    }

    /* Submit button */
    .btn-submit {
      width: 100%;
      padding: 13px 24px;
      background: var(--azure);
      color: white;
      font-family: 'Sora', sans-serif;
      font-size: 15px;
      font-weight: 600;
      border: none;
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      letter-spacing: -0.01em;
      box-shadow: 0 4px 16px rgba(0,120,212,0.3);
    }
    .btn-submit:hover {
      background: var(--azure-dark);
      box-shadow: 0 6px 20px rgba(0,120,212,0.4);
      transform: translateY(-1px);
    }
    .btn-submit:active {
      transform: translateY(0);
      box-shadow: 0 2px 8px rgba(0,120,212,0.3);
    }
    .btn-submit svg {
      width: 16px;
      height: 16px;
      stroke: white;
      fill: none;
      stroke-width: 2.2;
      stroke-linecap: round;
      stroke-linejoin: round;
      transition: transform 0.2s;
    }
    .btn-submit:hover svg { transform: translateX(3px); }

    /* Footer note */
    .footer-note {
      margin-top: 1.25rem;
      text-align: center;
      font-size: 12px;
      color: var(--ink-faint);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      font-weight: 300;
    }
    .footer-note svg {
      width: 13px;
      height: 13px;
      stroke: var(--ink-faint);
      fill: none;
      stroke-width: 2;
      flex-shrink: 0;
    }

    /* Loading state */
    .btn-submit.loading {
      pointer-events: none;
      opacity: 0.8;
    }
    .btn-submit.loading .btn-text { display: none; }
    .spinner {
      display: none;
      width: 18px;
      height: 18px;
      border: 2.5px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    .btn-submit.loading .spinner { display: block; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="page-wrapper">

    <div class="page-header">
      <!-- <div class="brand">
        <div class="brand-logo">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"/>
          </svg>
        </div>
        <span class="brand-name">HR Portal</span>
      </div> -->
      <h1>Portal<br>Pendaftaran Pegawai</h1>
      <p>Lengkapi formulir berikut.</p>
    </div>

    <div class="steps">
      <div class="step-item active">
        <div class="step-num">1</div>
        <span>Data Diri</span>
      </div>
      <div class="step-connector"></div>
      <!-- <div class="step-item">
        <div class="step-num">2</div>
        <span>Dokumen</span>
      </div> -->
      <div class="step-connector"></div>
      <div class="step-item">
        <div class="step-num">2</div>
        <span>Selesai</span>
      </div>
    </div>

    <div class="card">
      <form action="/submit" method="POST" enctype="multipart/form-data" id="regForm">

        <div class="field">
          <div class="field-label">
            <div class="icon">
              <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            </div>
            Nama Lengkap
            <!-- <span class="required">Wajib diisi</span> -->
          </div>
          <input type="text" name="nama" placeholder="Masukkan nama lengkap" required autocomplete="name">
        </div>

        <div class="field">
          <div class="field-label">
            <div class="icon">
              <svg viewBox="0 0 24 24"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
            </div>
            Alamat Email
              <!-- <span class="required">Wajib diisi</span> -->
          </div>
          <!-- <div class="field-hint">Masukkan email</div> -->
          <input type="email" name="email" placeholder="contoh@email.com" required autocomplete="email">
        </div>

        <div class="field">
          <div class="field-label">
            <div class="icon">
              <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="12" y1="18" x2="12" y2="12"/><line x1="9" y1="15" x2="15" y2="15"/></svg>
            </div>
            Foto KTP / CV
            <!-- <span class="required">Wajib diisi</span> -->
          </div>
          <div class="file-drop" id="fileDrop">
            <input type="file" name="file" accept="image/*,.pdf" required id="fileInput">
            <div class="file-drop-icon">
              <svg viewBox="0 0 24 24"><polyline points="16 16 12 12 8 16"/><line x1="12" y1="12" x2="12" y2="21"/><path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"/></svg>
            </div>
            <div class="file-drop-text"><span>Pilih file</span> atau seret ke sini</div>
            <div class="file-drop-hint">JPG, PNG, PDF — maks. 10 MB</div>
            <div class="file-name-display" id="fileNameDisplay">
              <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
              <span id="fileNameText">—</span>
            </div>
          </div>
        </div>

        <div class="divider"></div>

        <button type="submit" class="btn-submit" id="submitBtn">
          <div class="btn-text">
            Kirim Pendaftaran
            <svg viewBox="0 0 24 24"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
          </div>
          <div class="spinner"></div>
        </button>

      </form>
    </div>

    <div class="footer-note">
      <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      Data kamu dienkripsi dan disimpan dengan aman di Azure Cloud
    </div>

  </div>

  <script>
    const fileInput = document.getElementById('fileInput');
    const fileNameDisplay = document.getElementById('fileNameDisplay');
    const fileNameText = document.getElementById('fileNameText');
    const fileDrop = document.getElementById('fileDrop');
    const submitBtn = document.getElementById('submitBtn');

    fileInput.addEventListener('change', () => {
      if (fileInput.files.length > 0) {
        fileNameText.textContent = fileInput.files[0].name;
        fileNameDisplay.classList.add('visible');
        fileDrop.style.borderStyle = 'solid';
        fileDrop.style.borderColor = 'var(--azure)';
      }
    });

    fileDrop.addEventListener('dragover', e => {
      e.preventDefault();
      fileDrop.classList.add('drag-over');
    });
    fileDrop.addEventListener('dragleave', () => fileDrop.classList.remove('drag-over'));
    fileDrop.addEventListener('drop', e => {
      e.preventDefault();
      fileDrop.classList.remove('drag-over');
      if (e.dataTransfer.files.length > 0) {
        fileInput.files = e.dataTransfer.files;
        fileNameText.textContent = e.dataTransfer.files[0].name;
        fileNameDisplay.classList.add('visible');
        fileDrop.style.borderStyle = 'solid';
        fileDrop.style.borderColor = 'var(--azure)';
      }
    });

    document.getElementById('regForm').addEventListener('submit', () => {
      submitBtn.classList.add('loading');
    });
  </script>
</body>
</html>
